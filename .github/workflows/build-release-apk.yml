name: Build signed release APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-release:
    name: Build and sign release APK
    runs-on: ubuntu-latest

    steps:
      - name: Verify signing secrets are configured
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=""
          [ -z "$ANDROID_KEYSTORE_BASE64" ] && missing="$missing ANDROID_KEYSTORE_BASE64"
          [ -z "$ANDROID_KEYSTORE_PASSWORD" ] && missing="$missing ANDROID_KEYSTORE_PASSWORD"
          [ -z "$ANDROID_KEY_ALIAS" ] && missing="$missing ANDROID_KEY_ALIAS"
          [ -z "$ANDROID_KEY_PASSWORD" ] && missing="$missing ANDROID_KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing required repository secret(s):$missing"
            exit 1
          fi
          echo "All required signing secrets are present."

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Restore signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          keystore_file="$RUNNER_TEMP/release.keystore"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$keystore_file"
          if [ ! -s "$keystore_file" ]; then
            echo "::error::Decoded keystore is empty - check ANDROID_KEYSTORE_BASE64."
            exit 1
          fi
          chmod 600 "$keystore_file"
          echo "ANDROID_KEYSTORE_FILE=$keystore_file" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Verify APK exists and is signed
        run: |
          apk="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$apk" ]; then
            echo "::error::Expected APK not found at $apk"
            ls -R app/build/outputs/apk || true
            exit 1
          fi
          apksigner="$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -n1)"
          "$apksigner" verify --print-certs "$apk"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AndroTainer-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Clean up keystore
        if: always()
        run: |
          if [ -n "$ANDROID_KEYSTORE_FILE" ] && [ -f "$ANDROID_KEYSTORE_FILE" ]; then
            shred -u "$ANDROID_KEYSTORE_FILE" 2>/dev/null || rm -f "$ANDROID_KEYSTORE_FILE"
          fi
